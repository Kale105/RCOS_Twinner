points: data/raw/pointclouds/scan.npy
output_dir: outputs/pipeline

projection:
  type: relative_photo
  labels: data/raw/labels/photo_labels.npy
  fov_degrees: 60

point_model:
  run: true
  download_semantic_kitti_checkpoint: true
  checkpoint_dir: checkpoints
  num_classes: 19
  num_points: 45056
  device: cpu

fusion:
  point_weight: 0.6
  image_weight: 0.4
  unassigned_label: -1

evaluation:
  ground_truth: data/raw/labels/scan_point_labels.npy
  output: outputs/pipeline/evaluation.json
  ignore_label: -1

visualization:
  enabled: true
  output: outputs/pipeline/joint_labels.png
  comparison: true
  comparison_output: outputs/pipeline/joint_comparison.png
  max_points: 100000
  point_size: 1.0

